<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambiar contraseña — Mujeres con Propósito</title>
  <link rel="icon" type="image/png" href="assets/images/favicon-flower.png" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body class="private-locked">
  <section class="private-access-screen">
    <div class="private-access-card">
      <div class="private-access-icon">🔐</div>
      <h3>Cambiar contraseña</h3>
      <p>Escribe una contraseña nueva para tu cuenta.</p>

      <input type="password" id="newPassword" placeholder="Nueva contraseña" autocomplete="new-password" />
      <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" autocomplete="new-password" />

      <div class="private-access-actions">
        <button type="button" class="btn" id="savePasswordBtn">Guardar</button>
        <button type="button" class="btn" id="backToAdminBtn">Admin</button>
      </div>

      <button type="button" class="private-cancel-btn" id="backHomeBtn">Página principal</button>
      <div id="resetPasswordMsg" class="form-message" style="display:none;"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/reset-password.js?v=20260712-supabase-1"></script>
</body>
</html>
